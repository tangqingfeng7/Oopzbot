<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>后台总览</title>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/03CNSoft/apple.png" />
  <link rel="stylesheet" href="/admin-assets/admin-shell.css" />
</head>
<body data-admin-page="dashboard">
  <div class="shell-app">
    <header class="shell-topbar">
      <div class="topbar-main">
        <div class="brand-lockup">
          <p class="brand-lockup__eyebrow">Oopz Bot Admin</p>
          <h1 class="brand-lockup__title">后台管理</h1>
          <p class="brand-lockup__copy">顶部主导航、数据优先、专业 SaaS 工作台。</p>
        </div>
        <div class="topbar-actions">
          <span id="topStatus" class="status-text is-warning">等待登录</span>
          <button class="btn btn-ghost" type="button" onclick="loadOverview().catch(() => {})">刷新概览</button>
          <button class="btn" type="button" onclick="logout()">退出登录</button>
        </div>
      </div>
      <div class="topbar-nav-row">
        <nav id="topNav" class="top-nav" aria-label="后台导航"></nav>
      </div>
    </header>

    <div class="mobile-nav-shell">
      <div class="action-row" style="margin-bottom: 10px;">
        <span id="mobileStatus" class="status-text is-warning">等待登录</span>
      </div>
      <nav id="mobileNav" class="mobile-nav" aria-label="移动端后台导航"></nav>
    </div>

    <main class="shell-main">
      <section id="loginCard" class="auth-stage">
        <article class="auth-card">
          <h3 class="auth-card__title">登录后台总览</h3>
          <p class="auth-card__copy">登录后查看实时状态与关键指标。</p>
          <div class="stack" style="margin-top: 24px;">
            <input id="pwd" type="password" placeholder="请输入后台密码" />
            <div class="action-row">
              <button class="btn btn-primary" type="button" onclick="login()">进入总览</button>
            </div>
            <div id="loginMsg" class="msg"></div>
          </div>
        </article>
      </section>

      <section id="panel" class="hidden dashboard-grid">
        <div class="dashboard-grid__main">
          <article class="surface-card">
            <div class="action-row">
              <span id="overviewLiveHint" class="micro-status is-warning">等待连接</span>
              <button class="btn btn-primary" type="button" onclick="loadOverview().catch(() => {})">同步</button>
              <button class="btn btn-ghost" type="button" onclick="startOverviewStream()">恢复实时流</button>
              <button class="btn btn-ghost" type="button" onclick="stopOverviewStream()">暂停实时流</button>
            </div>
          </article>

          <section class="metrics-grid">
            <article class="metric-card metric-card--featured">
              <div class="metric-card__label">累计播放</div>
              <div id="sTotal" class="metric-card__value">0</div>
            </article>
            <div class="metric-stack">
              <article class="summary-card">
                <div class="summary-card__label">Redis</div>
                <div id="sRedis" class="summary-card__value">-</div>
              </article>
              <article class="summary-card">
                <div class="summary-card__label">运行时长（秒）</div>
                <div id="sUp" class="summary-card__value">0</div>
              </article>
              <article class="summary-card">
                <div class="summary-card__label">队列长度</div>
                <div id="sQueue" class="summary-card__value">0</div>
              </article>
            </div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="/admin-assets/admin-shell.js"></script>
  <script>
    let overviewStream = null;
    let overviewReconnectTimer = null;

    function setPageState(text, variant) {
      AdminShell.setStatus(text, variant, "topStatus");
      AdminShell.setStatus(text, variant, "mobileStatus");
    }

    function setLiveState(text, variant) {
      AdminShell.setMicroStatus(text, variant, "overviewLiveHint");
      setPageState(text, variant);
    }

    function renderOverview(data) {
      const redis = data.redis || "-";
      const redisElement = AdminShell.byId("sRedis");
      if (redisElement) {
        redisElement.textContent = redis;
        redisElement.dataset.value = redis;
      }
      AdminShell.animateNumber("sUp", Number(data.uptime_seconds ?? 0));
      AdminShell.animateNumber("sQueue", Number(data.queue_length ?? 0));
      AdminShell.animateNumber("sTotal", Number(data.statistics_summary?.total_plays ?? 0));
      AdminShell.flashUpdate("sRedis");
    }

    async function loadOverview() {
      const data = await AdminShell.req("/admin/api/overview");
      renderOverview(data);
      setLiveState("概览已同步", "success");
    }

    function stopOverviewStream() {
      if (overviewReconnectTimer) {
        clearTimeout(overviewReconnectTimer);
        overviewReconnectTimer = null;
      }
      if (overviewStream) {
        overviewStream.close();
        overviewStream = null;
      }
      const panel = AdminShell.byId("panel");
      if (!panel || panel.classList.contains("hidden")) {
        return;
      }
      setLiveState("实时流已暂停", "warning");
    }

    function startOverviewStream() {
      const panel = AdminShell.byId("panel");
      if (!panel || panel.classList.contains("hidden")) {
        return;
      }
      stopOverviewStream();
      setLiveState("正在连接实时流", "warning");

      const connect = () => {
        overviewStream = new EventSource("/admin/api/overview/stream", { withCredentials: true });
        overviewStream.addEventListener("overview", (event) => {
          try {
            renderOverview(JSON.parse(event.data || "{}"));
            setLiveState("实时连接中", "success");
          } catch (_) {
            setLiveState("实时数据解析失败", "error");
          }
        });
        overviewStream.onerror = () => {
          if (overviewStream) {
            overviewStream.close();
            overviewStream = null;
          }
          setLiveState("实时流重连中", "warning");
          if (overviewReconnectTimer) {
            clearTimeout(overviewReconnectTimer);
          }
          overviewReconnectTimer = setTimeout(connect, 1200);
        };
      };

      connect();
    }

    async function check() {
      try {
        await AdminShell.req("/admin/api/me");
        AdminShell.setAuthState({
          loggedIn: true,
          loggedInText: "已登录总览",
          statusTargets: ["topStatus", "mobileStatus"],
        });
        await loadOverview();
        startOverviewStream();
      } catch (_) {
        stopOverviewStream();
        AdminShell.setAuthState({
          loggedIn: false,
          loggedOutText: "等待登录",
          statusTargets: ["topStatus", "mobileStatus"],
        });
        AdminShell.showMessage("loginMsg", "");
        AdminShell.setMicroStatus("等待连接", "warning", "overviewLiveHint");
      }
    }

    async function login() {
      try {
        await AdminShell.req("/admin/api/login", {
          method: "POST",
          body: JSON.stringify({ password: AdminShell.byId("pwd").value || "" }),
        });
        AdminShell.showMessage("loginMsg", "登录成功");
        await check();
      } catch (error) {
        AdminShell.showMessage("loginMsg", error.message, true);
        setLiveState("登录失败", "error");
      }
    }

    async function logout() {
      try {
        await AdminShell.req("/admin/api/logout", { method: "POST", body: "{}" });
      } catch (_) {
      }
      await check();
    }

    AdminShell.init({ page: "dashboard", passwordHandler: login });
    check();

    document.addEventListener("visibilitychange", () => {
      const panel = AdminShell.byId("panel");
      if (!panel || panel.classList.contains("hidden")) {
        return;
      }
      if (document.hidden) {
        stopOverviewStream();
      } else {
        startOverviewStream();
      }
    });

    window.addEventListener("beforeunload", stopOverviewStream);
  </script>
</body>
</html>
