<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>系统页</title>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/03CNSoft/apple.png" />
  <link rel="stylesheet" href="/admin-assets/admin-shell.css" />
</head>
<body data-admin-page="system">
  <div class="shell-app">
    <header class="shell-topbar">
      <div class="topbar-main">
        <div class="brand-lockup">
          <p class="brand-lockup__eyebrow">Oopz Bot Admin</p>
          <h1 class="brand-lockup__title">系统页</h1>
          <p class="brand-lockup__copy">把播放器入口、系统快照和实时日志拆成明确的运维层级。</p>
        </div>
        <div class="topbar-actions">
          <span id="topStatus" class="status-text is-warning">等待登录</span>
          <button class="btn btn-ghost" type="button" onclick="loadSys().catch(() => {})">刷新系统信息</button>
          <button class="btn btn-ghost" type="button" onclick="loadLogs(logTailSize).catch(() => {})">刷新日志</button>
          <button class="btn" type="button" onclick="logout()">退出登录</button>
        </div>
      </div>
      <div class="topbar-nav-row">
        <nav id="topNav" class="top-nav" aria-label="后台导航"></nav>
      </div>
    </header>

    <div class="mobile-nav-shell">
      <div class="action-row" style="margin-bottom: 10px;">
        <span id="mobileStatus" class="status-text is-warning">等待登录</span>
      </div>
      <nav id="mobileNav" class="mobile-nav" aria-label="移动端后台导航"></nav>
    </div>

    <main class="shell-main">
      <section id="loginCard" class="auth-stage">
        <article class="auth-card">
          <h3 class="auth-card__title">登录系统页</h3>
          <p class="auth-card__copy">登录后查看链接、系统信息和日志。</p>
          <div class="stack" style="margin-top: 24px;">
            <input id="pwd" type="password" placeholder="请输入后台密码" />
            <div class="action-row">
              <button class="btn btn-primary" type="button" onclick="login()">进入系统页</button>
            </div>
            <div id="loginMsg" class="msg"></div>
          </div>
        </article>
      </section>

      <section id="panel" class="hidden table-stack">
        <article class="surface-card">
          <div class="action-row">
            <span id="logState" class="status-text is-warning">等待轮询</span>
            <button class="btn btn-ghost" type="button" onclick="loadLink().catch(() => {})">刷新链接</button>
            <button class="btn btn-ghost" type="button" onclick="loadSys().catch(() => {})">刷新系统信息</button>
            <button class="btn" type="button" onclick="startLogPolling()">恢复轮询</button>
            <button class="btn" type="button" onclick="stopLogPolling()">暂停轮询</button>
          </div>
        </article>

        <div class="system-grid">
          <article class="surface-card">
            <div class="section-head">
              <div>
                <h3 class="section-title">播放器链接</h3>
              </div>
            </div>
            <div class="link-box">
              <input id="playerLink" type="text" readonly placeholder="登录后生成播放器链接" />
            </div>
            <div class="action-row" style="margin-top: 16px;">
              <button class="btn btn-ghost" type="button" onclick="loadLink()">刷新链接</button>
              <button class="btn" type="button" onclick="copyLink()">复制链接</button>
              <button class="btn btn-danger" type="button" onclick="rotateLink()">重置链接</button>
            </div>
            <div id="linkMsg" class="msg"></div>
          </article>

          <article class="console-card">
            <div class="section-head">
              <div>
                <h3 class="section-title">系统信息</h3>
              </div>
            </div>
            <pre id="sys" class="console">-</pre>
          </article>
        </div>

        <article class="console-card">
          <div class="section-head">
            <div>
              <h3 class="section-title">日志</h3>
            </div>
          </div>
          <pre id="logs" class="console">-</pre>
          <div class="action-row" style="margin-top: 16px;">
            <button class="btn btn-ghost" type="button" onclick="loadLogs(200)">最近 200 行</button>
            <button class="btn btn-ghost" type="button" onclick="loadLogs(800)">最近 800 行</button>
            <button class="btn" type="button" onclick="startLogPolling()">恢复轮询</button>
            <button class="btn" type="button" onclick="stopLogPolling()">暂停轮询</button>
          </div>
        </article>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="/admin-assets/admin-shell.js"></script>
  <script>
    let logPollTimer = null;
    let logTailSize = 200;
    let logBusy = false;

    function setPageState(text, variant) {
      AdminShell.setStatus(text, variant, "topStatus");
      AdminShell.setStatus(text, variant, "mobileStatus");
      AdminShell.setStatus(text, variant, "logState");
    }

    function stopLogPolling() {
      if (logPollTimer) {
        clearInterval(logPollTimer);
        logPollTimer = null;
      }
      const panel = AdminShell.byId("panel");
      if (!panel || panel.classList.contains("hidden")) {
        return;
      }
      setPageState("日志轮询已暂停", "warning");
    }

    function startLogPolling() {
      const panel = AdminShell.byId("panel");
      if (!panel || panel.classList.contains("hidden")) {
        return;
      }
      stopLogPolling();
      setPageState("日志轮询中", "success");
      logPollTimer = setInterval(() => {
        loadLogs(logTailSize).catch(() => {});
      }, 2000);
    }

    async function check() {
      try {
        await AdminShell.req("/admin/api/me");
        AdminShell.setAuthState({
          loggedIn: true,
          loggedInText: "已登录系统页",
          statusTargets: ["topStatus", "mobileStatus"],
        });
        await Promise.all([loadLink(), loadSys(), loadLogs(logTailSize)]);
        startLogPolling();
      } catch (_) {
        stopLogPolling();
        AdminShell.setAuthState({
          loggedIn: false,
          loggedOutText: "等待登录",
          statusTargets: ["topStatus", "mobileStatus"],
        });
        AdminShell.showMessage("loginMsg", "");
        setPageState("等待轮询", "warning");
      }
    }

    async function login() {
      try {
        await AdminShell.req("/admin/api/login", {
          method: "POST",
          body: JSON.stringify({ password: AdminShell.byId("pwd").value || "" }),
        });
        AdminShell.showMessage("loginMsg", "登录成功");
        await check();
      } catch (error) {
        AdminShell.showMessage("loginMsg", error.message, true);
        setPageState("登录失败", "error");
      }
    }

    async function logout() {
      try {
        await AdminShell.req("/admin/api/logout", { method: "POST", body: "{}" });
      } catch (_) {
      }
      await check();
    }

    async function loadLink() {
      const data = await AdminShell.req("/admin/api/player/link");
      AdminShell.byId("playerLink").value = data.url || "";
      AdminShell.flashUpdate("playerLink");
    }

    async function rotateLink() {
      try {
        const data = await AdminShell.req("/admin/api/player/link/rotate", { method: "POST", body: "{}" });
        AdminShell.byId("playerLink").value = data.url || "";
        AdminShell.showMessage("linkMsg", "播放器链接已重置");
      } catch (error) {
        AdminShell.showMessage("linkMsg", error.message, true);
      }
    }

    async function copyLink() {
      const value = AdminShell.byId("playerLink").value || "";
      if (!value) {
        AdminShell.showMessage("linkMsg", "当前没有可复制的链接", true);
        return;
      }
      try {
        await AdminShell.copyText(value);
        AdminShell.showMessage("linkMsg", "链接已复制到剪贴板");
      } catch (_) {
        AdminShell.showMessage("linkMsg", "复制失败，请手动复制", true);
      }
    }

    async function loadSys() {
      const data = await AdminShell.req("/admin/api/system");
      AdminShell.byId("sys").textContent = JSON.stringify(data, null, 2);
      setPageState("系统信息已同步", "success");
    }

    async function loadLogs(lines) {
      logTailSize = lines || logTailSize;
      if (logBusy) {
        return;
      }
      logBusy = true;
      try {
        const logsElement = AdminShell.byId("logs");
        const stickBottom = logsElement.scrollTop + logsElement.clientHeight >= logsElement.scrollHeight - 8;
        const data = await AdminShell.req("/admin/api/logs?tail=" + logTailSize);
        const content = (data.lines || data.logs || []).join("\n") || "-";
        logsElement.textContent = content;
        if (stickBottom) {
          logsElement.scrollTop = logsElement.scrollHeight;
        }
        setPageState("日志轮询中", "success");
      } finally {
        logBusy = false;
      }
    }

    AdminShell.init({ page: "system", passwordHandler: login });
    check();

    document.addEventListener("visibilitychange", () => {
      const panel = AdminShell.byId("panel");
      if (!panel || panel.classList.contains("hidden")) {
        return;
      }
      if (document.hidden) {
        stopLogPolling();
      } else {
        startLogPolling();
      }
    });

    window.addEventListener("beforeunload", stopLogPolling);
  </script>
</body>
</html>
