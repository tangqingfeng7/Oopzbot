<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>统计页</title>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/03CNSoft/apple.png" />
  <link rel="stylesheet" href="/admin-assets/admin-shell.css" />
</head>
<body data-admin-page="stats">
  <div class="shell-app">
    <header class="shell-topbar">
      <div class="topbar-main">
        <div class="brand-lockup">
          <p class="brand-lockup__eyebrow">Oopz Bot Admin</p>
          <h1 class="brand-lockup__title">统计页</h1>
          <p class="brand-lockup__copy">让摘要、榜单和危险操作形成稳定阅读顺序，而不是只摆一张表。</p>
        </div>
        <div class="topbar-actions">
          <span id="topStatus" class="status-text is-warning">等待登录</span>
          <button class="btn btn-ghost" type="button" onclick="loadTop().catch(() => {})">刷新统计</button>
          <button class="btn btn-danger" type="button" onclick="clearHistory()">清空历史</button>
          <button class="btn" type="button" onclick="logout()">退出登录</button>
        </div>
      </div>
      <div class="topbar-nav-row">
        <nav id="topNav" class="top-nav" aria-label="后台导航"></nav>
      </div>
    </header>

    <div class="mobile-nav-shell">
      <div class="action-row" style="margin-bottom: 10px;">
        <span id="mobileStatus" class="status-text is-warning">等待登录</span>
      </div>
      <nav id="mobileNav" class="mobile-nav" aria-label="移动端后台导航"></nav>
    </div>

    <main class="shell-main">
      <section id="loginCard" class="auth-stage">
        <article class="auth-card">
          <h3 class="auth-card__title">登录统计页</h3>
          <p class="auth-card__copy">登录后查看最近 7 天的播放排行。</p>
          <div class="stack" style="margin-top: 24px;">
            <input id="pwd" type="password" placeholder="请输入后台密码" />
            <div class="action-row">
              <button class="btn btn-primary" type="button" onclick="login()">进入统计页</button>
            </div>
            <div id="loginMsg" class="msg"></div>
          </div>
        </article>
      </section>

      <section id="panel" class="hidden table-stack">
        <article class="surface-card">
          <div class="action-row">
            <span id="statsState" class="micro-status is-warning">等待同步</span>
            <button class="btn btn-primary" type="button" onclick="loadTop().catch(() => {})">刷新排行</button>
            <button class="btn btn-danger" type="button" onclick="clearHistory()">清空历史</button>
          </div>
        </article>

        <section class="summary-grid">
          <article class="summary-card">
            <div id="topTotalValue" class="summary-card__value">0</div>
          </article>
          <article class="summary-card">
            <div id="topPageValue" class="summary-card__value">1 / 1</div>
          </article>
          <article class="summary-card">
            <div id="leaderCountValue" class="summary-card__value">0</div>
          </article>
        </section>

        <article class="table-card">
          <div class="section-head">
            <div>
              <h3 class="section-title">播放排行</h3>
            </div>
          </div>
          <div class="table-shell">
            <table>
              <thead>
                <tr>
                  <th>歌曲</th>
                  <th>歌手</th>
                  <th>播放次数</th>
                  <th>最后播放时间</th>
                </tr>
              </thead>
              <tbody id="topRows">
                <tr>
                  <td colspan="4" class="empty-state">暂无统计数据</td>
                </tr>
              </tbody>
            </table>
          </div>
          <div class="action-row" style="margin-top: 14px;">
            <button class="btn btn-sm btn-ghost" type="button" onclick="changeTop(-1)">上一页</button>
            <button class="btn btn-sm btn-ghost" type="button" onclick="changeTop(1)">下一页</button>
            <span id="topInfo" class="mono"></span>
          </div>
        </article>

        <article class="table-card danger-block">
          <div class="section-head">
            <div>
              <h3 class="section-title">历史清理</h3>
            </div>
          </div>
          <div class="action-row">
            <button class="btn btn-danger" type="button" onclick="clearHistory()">清空播放历史</button>
          </div>
          <div id="msg" class="msg"></div>
        </article>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="/admin-assets/admin-shell.js"></script>
  <script>
    let topPage = 1;
    let topPages = 1;

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function setPageState(text, variant) {
      AdminShell.setStatus(text, variant, "topStatus");
      AdminShell.setStatus(text, variant, "mobileStatus");
      AdminShell.setMicroStatus(text, variant, "statsState");
    }

    async function check() {
      try {
        await AdminShell.req("/admin/api/me");
        AdminShell.setAuthState({
          loggedIn: true,
          loggedInText: "已登录统计页",
          statusTargets: ["topStatus", "mobileStatus"],
        });
        await loadTop();
      } catch (_) {
        AdminShell.setAuthState({
          loggedIn: false,
          loggedOutText: "等待登录",
          statusTargets: ["topStatus", "mobileStatus"],
        });
        AdminShell.showMessage("loginMsg", "");
        setPageState("等待同步", "warning");
      }
    }

    async function login() {
      try {
        await AdminShell.req("/admin/api/login", {
          method: "POST",
          body: JSON.stringify({ password: AdminShell.byId("pwd").value || "" }),
        });
        AdminShell.showMessage("loginMsg", "登录成功");
        await check();
      } catch (error) {
        AdminShell.showMessage("loginMsg", error.message, true);
        setPageState("登录失败", "error");
      }
    }

    async function logout() {
      try {
        await AdminShell.req("/admin/api/logout", { method: "POST", body: "{}" });
      } catch (_) {
      }
      await check();
    }

    async function loadTop() {
      const data = await AdminShell.req("/admin/api/statistics?days=7&top_page=" + topPage + "&top_page_size=12");
      const rows = (data.top_songs || [])
        .map((item) => {
          return (
            "<tr>" +
              '<td class="table-emphasis">' + escapeHtml(item.song_name || "-") + "</td>" +
              "<td>" + escapeHtml(item.artist || "-") + "</td>" +
              "<td>" + escapeHtml(item.play_count || 0) + "</td>" +
              "<td>" + escapeHtml(item.last_played_at || "-") + "</td>" +
            "</tr>"
          );
        })
        .join("");

      AdminShell.byId("topRows").innerHTML = rows || '<tr><td colspan="4" class="empty-state">暂无统计数据</td></tr>';
      topPage = data.top_page || 1;
      topPages = data.top_pages || 1;

      const leaderCount = data.top_songs && data.top_songs.length ? Number(data.top_songs[0].play_count || 0) : 0;
      AdminShell.animateNumber("topTotalValue", Number(data.top_total || 0));
      AdminShell.byId("topPageValue").textContent = topPage + " / " + topPages;
      AdminShell.byId("topPageValue").dataset.value = topPage;
      AdminShell.animateNumber("leaderCountValue", leaderCount);
      AdminShell.byId("topInfo").textContent = "第 " + topPage + "/" + topPages + " 页，共 " + (data.top_total || 0) + " 首";
      setPageState("统计已同步", "success");
    }

    function changeTop(delta) {
      const next = topPage + delta;
      if (next < 1 || next > topPages) {
        return;
      }
      topPage = next;
      loadTop().catch(() => {});
    }

    async function clearHistory() {
      try {
        const data = await AdminShell.req("/admin/api/statistics/clear_history", { method: "POST", body: "{}" });
        AdminShell.showMessage("msg", "已清理播放历史 " + (data.deleted || 0) + " 条");
        setPageState("历史已清空", "warning");
        await loadTop();
      } catch (error) {
        AdminShell.showMessage("msg", error.message, true);
      }
    }

    AdminShell.init({ page: "stats", passwordHandler: login });
    check();
  </script>
</body>
</html>
