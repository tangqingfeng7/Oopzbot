      <section id="panel" class="hidden table-stack">
        <!-- 摘要卡片 -->
        <article class="surface-card">
          <div class="action-row" style="flex-wrap:wrap;gap:16px">
            <div class="p-metric">
              <span class="p-metric__value" id="loadedCount">-</span>
              <span class="p-metric__label">已加载</span>
            </div>
            <div class="p-metric">
              <span class="p-metric__value" id="availableCount">-</span>
              <span class="p-metric__label">可加载</span>
            </div>
            <span id="pluginState" class="micro-status is-warning">等待同步</span>
          </div>
        </article>

        <!-- 已加载插件表格 -->
        <article class="table-card">
          <div class="section-head">
            <h3 class="section-title">已加载插件</h3>
          </div>
          <div class="table-shell">
            <table>
              <thead>
                <tr>
                  <th>名称</th>
                  <th>描述</th>
                  <th>版本</th>
                  <th>类型</th>
                  <th>命令</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="loadedRows">
                <tr><td colspan="6" class="empty-state">暂无数据</td></tr>
              </tbody>
            </table>
          </div>
        </article>

        <!-- 可加载插件列表 -->
        <article class="table-card" id="availableCard" style="display:none">
          <div class="section-head">
            <h3 class="section-title">可加载插件</h3>
          </div>
          <div class="table-shell">
            <table>
              <thead>
                <tr>
                  <th>插件名称</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="availableRows">
                <tr><td colspan="2" class="empty-state">暂无可加载插件</td></tr>
              </tbody>
            </table>
          </div>
        </article>

        <!-- 配置编辑模态框 -->
        <div id="cfgOverlay" class="m-modal-overlay" onclick="closeConfigEditor()"></div>
        <div id="cfgDialog" class="m-modal" style="width:min(640px,94vw)">
          <header class="m-modal__head">
            <h3 id="cfgTitle" class="m-modal__title">编辑插件配置</h3>
            <button class="m-modal__close" onclick="closeConfigEditor()" aria-label="关闭">&times;</button>
          </header>
          <div class="m-modal__body">
            <div id="cfgSchemaHint" class="p-schema-hint" style="display:none"></div>
            <textarea id="cfgEditor" class="p-config-editor" rows="18" spellcheck="false" placeholder="{}"></textarea>
            <div id="cfgMsg" class="msg" style="margin-top:8px"></div>
          </div>
          <footer class="m-modal__foot">
            <button class="btn btn-ghost" type="button" onclick="closeConfigEditor()">取消</button>
            <button class="btn btn-primary" type="button" onclick="saveConfig()">保存并重载</button>
          </footer>
        </div>
      </section>

      <style>
        .p-metric {
          display: flex; flex-direction: column; align-items: center;
          min-width: 72px;
        }
        .p-metric__value {
          font-size: 28px; font-weight: 800; line-height: 1.1;
          color: var(--ink);
        }
        .p-metric__label {
          font-size: 11px; font-weight: 600; text-transform: uppercase;
          color: var(--ink-faint); letter-spacing: .04em; margin-top: 2px;
        }
        .p-tag {
          display: inline-block; font-size: 11px; font-weight: 600;
          padding: 2px 8px; border-radius: 6px;
          background: var(--bg-soft); color: var(--ink-soft);
          border: 1px solid var(--line);
        }
        .p-tag--builtin { background: #dbeafe; color: #1e40af; border-color: #93c5fd; }
        .p-tag--ext { background: #dcfce7; color: #166534; border-color: #86efac; }
        .p-cmds {
          display: flex; flex-wrap: wrap; gap: 4px;
        }
        .p-cmds code {
          font-size: 11px; padding: 1px 6px; border-radius: 4px;
          background: var(--bg-soft); border: 1px solid var(--line);
          font-family: var(--font-mono, "SF Mono", "Fira Code", monospace);
        }
        .p-actions { display: flex; gap: 4px; flex-wrap: wrap; }
        .p-actions .btn { padding: 2px 10px; font-size: 11px; min-height: 28px; border-radius: 7px; }
        #loadedRows tr { transition: background .12s ease; }
        #loadedRows tr:hover { background: var(--bg-soft); }
        #availableRows tr { transition: background .12s ease; }
        #availableRows tr:hover { background: var(--bg-soft); }
        .p-config-editor {
          width: 100%; min-height: 280px; resize: vertical;
          font-family: var(--font-mono, "SF Mono", "Fira Code", monospace);
          font-size: 13px; line-height: 1.6;
          padding: 12px; border-radius: 8px;
          border: 1px solid var(--line);
          background: var(--bg); color: var(--ink);
          tab-size: 2;
        }
        .p-config-editor:focus {
          outline: none; border-color: var(--accent, #6366f1);
          box-shadow: 0 0 0 3px rgba(99,102,241,.15);
        }
        .p-schema-hint {
          font-size: 12px; color: var(--ink-soft);
          padding: 8px 12px; margin-bottom: 8px;
          background: var(--bg-soft); border-radius: 6px;
          border: 1px solid var(--line);
          max-height: 120px; overflow-y: auto;
          white-space: pre-wrap; word-break: break-all;
          font-family: var(--font-mono, "SF Mono", "Fira Code", monospace);
        }
      </style>
