      <section id="panel" class="hidden table-stack">
        <article class="surface-card">
          <div class="action-row" style="flex-wrap:wrap">
            <span id="membersState" class="micro-status is-warning">等待同步</span>
            <select id="areaPicker" class="m-area-select" onchange="onAreaChange()">
              <option value="">加载中...</option>
            </select>
            <input id="memberSearch" type="text" class="input" placeholder="搜索成员..." style="width:180px" onkeydown="if(event.key==='Enter')loadMembers()">
            <button class="btn btn-ghost" type="button" onclick="loadMembers()">搜索</button>
            <button class="btn btn-ghost" type="button" onclick="loadBlocks()">封禁列表</button>
          </div>
        </article>

        <section class="summary-grid">
          <article class="summary-card">
            <div class="summary-card__label">总成员</div>
            <div id="totalMembers" class="summary-card__value">0</div>
          </article>
          <article class="summary-card">
            <div class="summary-card__label">在线</div>
            <div id="onlineMembers" class="summary-card__value">0</div>
          </article>
          <article class="summary-card">
            <div class="summary-card__label">封禁中</div>
            <div id="blockedCount" class="summary-card__value">0</div>
          </article>
        </section>

        <article class="table-card">
          <div class="section-head">
            <h3 class="section-title">成员列表</h3>
          </div>
          <div class="table-shell">
            <table>
              <thead>
                <tr>
                  <th style="width:40%">成员</th>
                  <th>身份组</th>
                  <th>状态</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="memberRows">
                <tr><td colspan="4" class="empty-state">暂无数据</td></tr>
              </tbody>
            </table>
          </div>
          <div class="action-row" style="justify-content:center;gap:8px;padding-top:8px">
            <button class="btn btn-ghost" type="button" onclick="prevPage()">上一页</button>
            <span id="pageInfo" style="line-height:32px;font-size:13px;color:#94a3b8">1</span>
            <button class="btn btn-ghost" type="button" onclick="nextPage()">下一页</button>
          </div>
        </article>

        <!-- 封禁列表 -->
        <article id="blocksCard" class="table-card" style="display:none">
          <div class="section-head">
            <h3 class="section-title">封禁列表</h3>
          </div>
          <div class="table-shell">
            <table>
              <thead>
                <tr>
                  <th>昵称</th>
                  <th>UID</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="blockRows">
                <tr><td colspan="3" class="empty-state">暂无封禁</td></tr>
              </tbody>
            </table>
          </div>
        </article>

        <!-- 发送消息/公告 -->
        <article class="table-card" id="sendCard">
          <div class="section-head">
            <h3 class="section-title">发送消息</h3>
          </div>
          <div class="m-send-panel">
            <div class="m-send-target">
              <div class="m-send-field">
                <label class="m-send-field__label">目标域</label>
                <div class="m-select-wrap">
                  <select id="sendAreaPicker" class="m-select" onchange="onSendAreaChange()">
                    <option value="">加载中...</option>
                  </select>
                  <span class="m-select-arrow"></span>
                </div>
              </div>
              <div class="m-send-field__sep"></div>
              <div class="m-send-field" style="flex:1.2">
                <label class="m-send-field__label">目标频道</label>
                <div class="m-select-wrap">
                  <select id="channelPicker" class="m-select">
                    <option value="">先选择域...</option>
                  </select>
                  <span class="m-select-arrow"></span>
                </div>
              </div>
              <button class="m-send-refresh" type="button" onclick="refreshChannels()" title="刷新频道列表">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13.65 2.35A7.96 7.96 0 008 0C3.58 0 .01 3.58.01 8S3.58 16 8 16c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 018 14 6 6 0 012 8a6 6 0 016-6c1.66 0 3.14.69 4.22 1.78L9 7h7V0l-2.35 2.35z" fill="currentColor"/></svg>
              </button>
            </div>
            <div class="m-send-compose">
              <textarea id="sendContent" class="m-send-textarea" rows="4" placeholder="输入消息内容...&#10;支持 **粗体**、*斜体* 等 Markdown 格式"></textarea>
            </div>
            <div class="m-send-bar">
              <span id="sendStatus" class="m-send-status"></span>
              <button class="m-send-btn m-send-btn--normal" type="button" onclick="doSendMessage()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="margin-right:4px"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="currentColor"/></svg>
                发送消息
              </button>
              <button class="m-send-btn m-send-btn--announce" type="button" onclick="doSendAnnouncement()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="margin-right:4px"><path d="M18 11v2h4v-2h-4zm-2 6.61c.96.71 2.21 1.65 3.2 2.39.4-.53.8-1.07 1.2-1.6-.99-.74-2.24-1.68-3.2-2.4-.4.54-.8 1.08-1.2 1.61zM20.4 5.6c-.4-.53-.8-1.07-1.2-1.6-.99.74-2.24 1.68-3.2 2.4.4.53.8 1.07 1.2 1.6.96-.72 2.21-1.65 3.2-2.4zM4 9c-1.1 0-2 .9-2 2v2c0 1.1.9 2 2 2h1l5 5V4L5 9H4zm11.5 3c0-1.33-.58-2.53-1.5-3.35v6.69c.92-.81 1.5-2.01 1.5-3.34z" fill="currentColor"/></svg>
                发送公告
              </button>
            </div>
          </div>
        </article>

        <!-- 用户详情抽屉 -->
        <div id="drawerOverlay" class="m-drawer-overlay" onclick="closeDrawer()"></div>
        <aside id="detailDrawer" class="m-drawer">
          <header class="m-drawer__head">
            <h3 id="detailName" class="m-drawer__title">用户详情</h3>
            <button class="m-drawer__close" onclick="closeDrawer()" aria-label="关闭">&times;</button>
          </header>
          <div class="m-drawer__body">
            <div id="detailProfile" class="m-profile"></div>
            <div id="detailInfo" class="m-info-grid"></div>
            <div id="detailActions" class="m-action-bar"></div>
            <div id="detailRoles" class="m-role-section"></div>
          </div>
        </aside>

        <!-- 自定义弹窗 -->
        <div id="modalOverlay" class="m-modal-overlay" onclick="closeModal()"></div>
        <div id="modalDialog" class="m-modal">
          <header class="m-modal__head">
            <h3 id="modalTitle" class="m-modal__title">操作</h3>
            <button class="m-modal__close" onclick="closeModal()" aria-label="关闭">&times;</button>
          </header>
          <div id="modalBody" class="m-modal__body"></div>
          <footer id="modalFooter" class="m-modal__foot"></footer>
        </div>
      </section>

      <style>
        /* ---- 抽屉 ---- */
        .m-drawer-overlay {
          position: fixed; inset: 0;
          background: rgba(0,0,0,.35); backdrop-filter: blur(2px);
          z-index: 999; transition: opacity .3s ease;
          opacity: 0; pointer-events: none;
        }
        .m-drawer-overlay.is-open { opacity: 1; pointer-events: auto; }

        .m-drawer {
          position: fixed; top: 0; right: 0; bottom: 0;
          width: min(420px, 92vw); z-index: 1000;
          background: var(--paper); border-left: 1px solid var(--line);
          box-shadow: -8px 0 32px rgba(0,0,0,.08);
          transform: translateX(100%); transition: transform .3s cubic-bezier(.4,0,.2,1);
          display: flex; flex-direction: column; overflow: hidden;
        }
        .m-drawer.is-open { transform: translateX(0); }

        .m-drawer__head {
          display: flex; align-items: center; justify-content: space-between;
          padding: 20px 24px 16px; border-bottom: 1px solid var(--line);
          flex-shrink: 0;
        }
        .m-drawer__title { margin: 0; font-size: 17px; font-weight: 700; }
        .m-drawer__close {
          width: 32px; height: 32px; border: none; background: var(--bg-soft);
          border-radius: 8px; font-size: 20px; color: var(--ink-soft);
          cursor: pointer; display: flex; align-items: center; justify-content: center;
          transition: background .15s;
        }
        .m-drawer__close:hover { background: var(--line-strong); }
        .m-drawer__body { flex: 1; overflow-y: auto; padding: 20px 24px 24px; }

        /* ---- 详情 profile ---- */
        .m-profile {
          display: flex; flex-direction: column; align-items: center;
          padding-bottom: 20px; margin-bottom: 16px; border-bottom: 1px solid var(--line);
        }
        .m-profile__avatar {
          width: 80px; height: 80px; border-radius: 50%; object-fit: cover;
          border: 3px solid var(--line); margin-bottom: 10px;
        }
        .m-profile__name { font-size: 18px; font-weight: 700; margin: 0 0 2px; }
        .m-profile__sub { font-size: 12px; color: var(--ink-faint); letter-spacing: .02em; }

        .m-badge {
          display: inline-flex; align-items: center; gap: 4px;
          font-size: 11px; font-weight: 600; padding: 2px 10px;
          border-radius: 99px; letter-spacing: .02em;
        }
        .m-badge--online  { background: #dcfce7; color: #166534; }
        .m-badge--offline { background: #f1f5f9; color: #64748b; }
        .m-badge--muted   { background: #fee2e2; color: #991b1b; }

        /* ---- 详情 info grid ---- */
        .m-info-grid {
          display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
          margin-bottom: 16px;
        }
        .m-info-item {
          background: var(--bg-soft); border-radius: var(--radius-sm);
          padding: 10px 12px;
        }
        .m-info-item.full { grid-column: 1 / -1; }
        .m-info-label { font-size: 11px; color: var(--ink-faint); font-weight: 600; margin-bottom: 2px; letter-spacing: .03em; }
        .m-info-value { font-size: 13px; color: var(--ink); word-break: break-all; }

        /* ---- 详情 action bar ---- */
        .m-action-bar {
          display: flex; flex-wrap: wrap; gap: 8px;
          padding: 16px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
          margin-bottom: 16px;
        }
        .m-action-bar .btn { flex: 1 1 auto; min-width: 0; }

        /* ---- 详情 role section ---- */
        .m-role-section__title {
          font-size: 12px; font-weight: 700; color: var(--ink-soft);
          margin-bottom: 8px; letter-spacing: .03em;
        }
        .m-role-tag {
          display: inline-flex; align-items: center; gap: 4px;
          font-size: 12px; font-weight: 600; padding: 4px 12px;
          border-radius: 8px; margin: 3px; cursor: pointer;
          border: 1px solid var(--line); background: var(--paper-strong);
          color: var(--ink); transition: all .15s ease;
        }
        .m-role-tag:hover { border-color: var(--ink); }
        .m-role-tag--owned {
          background: var(--ink); color: #fff; border-color: var(--ink);
        }
        .m-role-tag--owned:hover { background: #333; }
        .m-role-tag__icon { font-size: 14px; }

        .m-duration-grid {
          display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
        }
        .m-duration-btn {
          display: flex; flex-direction: column; align-items: center; justify-content: center;
          padding: 14px 8px; border-radius: var(--radius-sm);
          border: 1px solid var(--line); background: var(--paper-strong);
          cursor: pointer; transition: all .15s ease;
        }
        .m-duration-btn:hover { border-color: var(--ink); background: var(--bg-soft); }
        .m-duration-btn__val { font-size: 20px; font-weight: 700; line-height: 1.2; }
        .m-duration-btn__unit { font-size: 11px; color: var(--ink-faint); margin-top: 2px; }

        .m-confirm-text {
          font-size: 14px; line-height: 1.7; color: var(--ink-soft);
          padding: 4px 0;
        }
        .m-confirm-text strong { color: var(--ink); }

        /* ---- 成员列表行 hover ---- */
        #memberRows tr { transition: background .12s ease; }
        #memberRows tr:hover { background: var(--bg-soft); }

        .m-member-actions { display: flex; gap: 4px; }
        .m-member-actions .btn { padding: 2px 10px; font-size: 11px; min-height: 28px; border-radius: 7px; }

        .m-role-badge {
          display: inline-block; font-size: 11px; font-weight: 600;
          padding: 2px 8px; border-radius: 6px;
          background: var(--bg-soft); color: var(--ink-soft);
          border: 1px solid var(--line);
        }

        /* ---- 域选择器（继承全局 select 样式，仅覆盖紧凑/截断） ---- */
        .m-area-select {
          min-height: 34px;
          padding-top: 0;
          padding-bottom: 0;
          font-size: 13px;
          font-weight: 600;
          max-width: 200px;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        .m-status-dot {
          width: 8px; height: 8px; border-radius: 50%;
          display: inline-block; margin-right: 4px; vertical-align: middle;
        }

        /* ---- 骨架屏 ---- */
        @keyframes m-shimmer {
          0% { background-position: -200px 0; }
          100% { background-position: 200px 0; }
        }
        .m-skel {
          background: linear-gradient(90deg, var(--bg-soft) 25%, var(--line) 50%, var(--bg-soft) 75%);
          background-size: 400px 100%;
          animation: m-shimmer 1.4s ease infinite;
          border-radius: 6px;
        }
        .m-skel--circle { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto; }
        .m-skel--line { height: 14px; margin: 0 auto; }
        .m-skel--block { height: 52px; margin-bottom: 10px; border-radius: var(--radius-sm); }
        .m-profile__skeleton {
          display: flex; flex-direction: column; align-items: center;
          padding-bottom: 20px; margin-bottom: 16px; border-bottom: 1px solid var(--line);
        }

        /* ---- 发送消息面板 ---- */
        .m-send-panel { padding: 20px; }

        .m-send-target {
          display: flex; align-items: flex-end; gap: 12px;
          padding-bottom: 16px;
          margin-bottom: 16px;
          border-bottom: 1px solid var(--line);
        }
        .m-send-field { flex: 1; min-width: 0; }
        .m-send-field__label {
          display: block; font-size: 11px; font-weight: 700;
          text-transform: uppercase; letter-spacing: .5px;
          color: var(--ink-faint); margin-bottom: 6px;
        }
        .m-send-field__sep {
          width: 1px; height: 36px; background: var(--line);
          flex-shrink: 0; align-self: flex-end; margin-bottom: 4px;
        }

        .m-select-wrap {
          position: relative; width: 100%; overflow: visible;
        }
        .m-select { display: none; }
        .m-select-arrow { display: none; }

        .m-send-refresh {
          flex-shrink: 0; width: 38px; height: 38px;
          display: flex; align-items: center; justify-content: center;
          border: 1.5px solid var(--line); border-radius: 10px;
          background: var(--paper-strong); color: var(--ink-soft);
          cursor: pointer; transition: all .2s ease;
          margin-bottom: 0;
        }
        .m-send-refresh:hover {
          border-color: var(--ink-faint); color: var(--ink);
          background: var(--bg-soft);
        }
        .m-send-refresh:active svg { transform: rotate(180deg); }
        .m-send-refresh svg { transition: transform .3s ease; }

        .m-send-compose { margin-bottom: 14px; }
        .m-send-textarea {
          width: 100%; resize: vertical; box-sizing: border-box;
          border: 1.5px solid var(--line); border-radius: 10px;
          padding: 12px 14px; font-size: 13px; line-height: 1.7;
          font-family: inherit; color: var(--ink);
          background: var(--paper-strong);
          transition: border-color .2s ease, box-shadow .2s ease;
        }
        .m-send-textarea:hover { border-color: var(--ink-faint); }
        .m-send-textarea:focus {
          border-color: var(--ink); outline: none;
          box-shadow: 0 0 0 3px rgba(0,0,0,.06);
        }
        .m-send-textarea::placeholder { color: var(--ink-faint); }

        .m-send-bar {
          display: flex; align-items: center; gap: 8px;
        }
        .m-send-status {
          margin-right: auto; font-size: 12px; color: var(--ink-faint);
          transition: opacity .3s ease;
        }
        .m-send-status.is-ok { color: var(--success, #22c55e); font-weight: 600; }
        .m-send-status.is-err { color: var(--danger, #ef4444); font-weight: 600; }

        .m-send-btn {
          display: inline-flex; align-items: center; justify-content: center;
          padding: 8px 18px; border-radius: 10px;
          font-size: 13px; font-weight: 600;
          border: 1.5px solid transparent;
          cursor: pointer; transition: all .2s ease;
          white-space: nowrap;
        }
        .m-send-btn--normal {
          background: var(--paper-strong); color: var(--ink);
          border-color: var(--line);
        }
        .m-send-btn--normal:hover {
          border-color: var(--ink-faint); background: var(--bg-soft);
        }
        .m-send-btn--announce {
          background: var(--ink); color: var(--paper);
          border-color: var(--ink);
        }
        .m-send-btn--announce:hover {
          opacity: .88;
        }

        /* ---- 抽屉内容淡入 ---- */
        .m-drawer__body { will-change: opacity, transform; }
      </style>
