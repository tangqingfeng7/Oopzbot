<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>音乐管理</title>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/03CNSoft/apple.png" />
  <link rel="stylesheet" href="/admin-assets/admin-shell.css" />
</head>
<body data-admin-page="music">
  <div class="shell-app">
    <header class="shell-topbar">
      <div class="topbar-main">
        <div class="brand-lockup">
          <p class="brand-lockup__eyebrow">Oopz Bot Admin</p>
          <h1 class="brand-lockup__title">音乐管理</h1>
          <p class="brand-lockup__copy">把播放控制、搜索加歌和队列调度整理成标准运营面板。</p>
        </div>
        <div class="topbar-actions">
          <span id="topStatus" class="status-text is-warning">等待登录</span>
          <button class="btn btn-ghost" type="button" onclick="loadQueue().catch(() => {})">刷新队列</button>
          <button class="btn" type="button" onclick="logout()">退出登录</button>
        </div>
      </div>
      <div class="topbar-nav-row">
        <nav id="topNav" class="top-nav" aria-label="后台导航"></nav>
      </div>
    </header>

    <div class="mobile-nav-shell">
      <div class="action-row" style="margin-bottom: 10px;">
        <span id="mobileStatus" class="status-text is-warning">等待登录</span>
      </div>
      <nav id="mobileNav" class="mobile-nav" aria-label="移动端后台导航"></nav>
    </div>

    <main class="shell-main">
      <section id="loginCard" class="auth-stage">
        <article class="auth-card">
          <h3 class="auth-card__title">登录音乐后台</h3>
          <p class="auth-card__copy">登录后控制播放、搜索歌曲和调整队列。</p>
          <div class="stack" style="margin-top: 24px;">
            <input id="pwd" type="password" placeholder="请输入后台密码" />
            <div class="action-row">
              <button class="btn btn-primary" type="button" onclick="login()">进入音乐控制台</button>
            </div>
            <div id="loginMsg" class="msg"></div>
          </div>
        </article>
      </section>

      <section id="panel" class="hidden table-stack">
        <article class="surface-card">
          <div class="action-row">
            <span id="ctlState" class="micro-status is-neutral">等待操作</span>
            <button class="btn" type="button" onclick="control('pause')">暂停</button>
            <button class="btn" type="button" onclick="control('resume')">恢复</button>
            <button class="btn" type="button" onclick="control('next')">下一首</button>
            <button class="btn btn-danger" type="button" onclick="control('stop')">停止</button>
            <button class="btn btn-danger" type="button" onclick="clearQueue()">清空队列</button>
          </div>
          <div id="ctlMsg" class="msg" style="margin-top: 12px;"></div>
        </article>

        <div class="split-layout">
          <article class="table-card">
            <div class="section-head">
              <div>
                <h3 class="section-title">后台点歌</h3>
              </div>
            </div>
            <div class="action-row">
              <input id="kw" type="text" placeholder="输入关键词搜索歌曲" />
              <button class="btn btn-primary" type="button" onclick="searchSongs(true)">搜索</button>
            </div>
            <div class="table-shell" style="margin-top: 18px;">
              <table>
                <thead>
                  <tr>
                    <th>歌曲</th>
                    <th>歌手</th>
                    <th>专辑</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="searchRows">
                  <tr>
                    <td colspan="4" class="empty-state">输入关键词后开始搜索</td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div class="action-row" style="margin-top: 14px;">
              <button class="btn btn-sm btn-ghost" type="button" onclick="changeSearch(-1)">上一页</button>
              <button class="btn btn-sm btn-ghost" type="button" onclick="changeSearch(1)">下一页</button>
              <span id="searchInfo" class="mono"></span>
            </div>
            <div id="searchMsg" class="msg"></div>
          </article>

          <article class="table-card">
            <div class="section-head">
              <div>
                <h3 class="section-title">队列</h3>
              </div>
            </div>
            <div class="table-shell">
              <table>
                <thead>
                  <tr>
                    <th>#</th>
                    <th>歌曲</th>
                    <th>歌手</th>
                    <th>时长</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="queueRows">
                  <tr>
                    <td colspan="5" class="empty-state">当前队列为空</td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div class="action-row" style="margin-top: 14px;">
              <button class="btn btn-sm btn-ghost" type="button" onclick="changeQueue(-1)">上一页</button>
              <button class="btn btn-sm btn-ghost" type="button" onclick="changeQueue(1)">下一页</button>
              <span id="queueInfo" class="mono"></span>
            </div>
            <div id="queueMsg" class="msg"></div>
          </article>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="/admin-assets/admin-shell.js"></script>
  <script>
    let searchResults = [];
    let searchPage = 1;
    let searchPages = 1;
    let searchKeyword = "";
    let queuePage = 1;
    let queuePages = 1;

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function setPageState(text, variant) {
      AdminShell.setStatus(text, variant, "topStatus");
      AdminShell.setStatus(text, variant, "mobileStatus");
    }

    function setControlState(text, variant) {
      AdminShell.setMicroStatus(text, variant, "ctlState");
      setPageState(text, variant);
    }

    async function check() {
      try {
        await AdminShell.req("/admin/api/me");
        AdminShell.setAuthState({
          loggedIn: true,
          loggedInText: "已登录音乐页",
          statusTargets: ["topStatus", "mobileStatus"],
        });
        await loadQueue();
        if (searchKeyword) {
          await searchSongs(false);
        }
      } catch (_) {
        AdminShell.setAuthState({
          loggedIn: false,
          loggedOutText: "等待登录",
          statusTargets: ["topStatus", "mobileStatus"],
        });
        AdminShell.showMessage("loginMsg", "");
        AdminShell.setMicroStatus("等待操作", "neutral", "ctlState");
      }
    }

    async function login() {
      try {
        await AdminShell.req("/admin/api/login", {
          method: "POST",
          body: JSON.stringify({ password: AdminShell.byId("pwd").value || "" }),
        });
        AdminShell.showMessage("loginMsg", "登录成功");
        await check();
      } catch (error) {
        AdminShell.showMessage("loginMsg", error.message, true);
        setPageState("登录失败", "error");
      }
    }

    async function logout() {
      try {
        await AdminShell.req("/admin/api/logout", { method: "POST", body: "{}" });
      } catch (_) {
      }
      await check();
    }

    async function control(action) {
      try {
        await AdminShell.req("/admin/api/control", {
          method: "POST",
          body: JSON.stringify({ action }),
        });
        AdminShell.showMessage("ctlMsg", "操作成功：" + action);
        setControlState("播放器状态已更新", "success");
        await loadQueue();
      } catch (error) {
        AdminShell.showMessage("ctlMsg", error.message, true);
        setControlState("播放控制失败", "error");
      }
    }

    async function clearQueue() {
      try {
        await AdminShell.req("/admin/api/queue/clear", { method: "POST", body: "{}" });
        AdminShell.showMessage("ctlMsg", "队列已清空");
        setControlState("队列已清空", "warning");
        await loadQueue();
      } catch (error) {
        AdminShell.showMessage("ctlMsg", error.message, true);
      }
    }

    async function loadQueue() {
      const data = await AdminShell.req("/admin/api/queue?page=" + queuePage + "&page_size=10");
      const rows = [];

      if (data.current) {
        rows.push(
          '<tr class="table-row--current">' +
            "<td>NOW</td>" +
            '<td class="table-emphasis">' + escapeHtml(data.current.name || "-") + "</td>" +
            "<td>" + escapeHtml(data.current.artists || "-") + "</td>" +
            "<td>" + escapeHtml(data.current.durationText || "-") + "</td>" +
            '<td><span class="badge-soft">当前播放</span></td>' +
          "</tr>"
        );
      }

      (data.queue || []).forEach((item) => {
        rows.push(
          "<tr>" +
            "<td>" + (item.index ?? "-") + "</td>" +
            "<td>" + escapeHtml(item.name || "-") + "</td>" +
            "<td>" + escapeHtml(item.artists || "-") + "</td>" +
            "<td>" + escapeHtml(item.durationText || "-") + "</td>" +
            "<td>" +
              '<div class="action-row">' +
                '<button class="btn btn-sm btn-ghost" type="button" onclick="queueAction(\'top\', ' + item.index + ')">置顶</button>' +
                '<button class="btn btn-sm btn-danger" type="button" onclick="queueAction(\'remove\', ' + item.index + ')">删除</button>' +
              "</div>" +
            "</td>" +
          "</tr>"
        );
      });

      AdminShell.byId("queueRows").innerHTML = rows.join("") || '<tr><td colspan="5" class="empty-state">当前队列为空</td></tr>';
      queuePage = data.page || 1;
      queuePages = data.pages || 1;
      AdminShell.byId("queueInfo").textContent = "第 " + queuePage + "/" + queuePages + " 页，共 " + (data.total || 0) + " 首";
      setPageState("队列已同步", "success");
    }

    async function queueAction(action, index) {
      try {
        await AdminShell.req("/admin/api/queue/action", {
          method: "POST",
          body: JSON.stringify({ action, index }),
        });
        AdminShell.showMessage("queueMsg", "队列操作成功");
        await loadQueue();
      } catch (error) {
        AdminShell.showMessage("queueMsg", error.message, true);
      }
    }

    function changeQueue(delta) {
      const next = queuePage + delta;
      if (next < 1 || next > queuePages) {
        return;
      }
      queuePage = next;
      loadQueue().catch(() => {});
    }

    async function searchSongs(reset) {
      if (reset) {
        searchPage = 1;
        searchKeyword = (AdminShell.byId("kw").value || "").trim();
      }
      if (!searchKeyword) {
        AdminShell.byId("searchRows").innerHTML = '<tr><td colspan="4" class="empty-state">请输入关键词后再搜索</td></tr>';
        AdminShell.byId("searchInfo").textContent = "";
        AdminShell.showMessage("searchMsg", "请输入关键词", true);
        return;
      }
      try {
        const data = await AdminShell.req(
          "/admin/api/search?keyword=" + encodeURIComponent(searchKeyword) + "&page=" + searchPage + "&page_size=10"
        );
        searchResults = data.results || [];
        AdminShell.byId("searchRows").innerHTML =
          searchResults
            .map((item, index) => {
              return (
                "<tr>" +
                  "<td>" + escapeHtml(item.name || "-") + "</td>" +
                  "<td>" + escapeHtml(item.artists || "-") + "</td>" +
                  "<td>" + escapeHtml(item.album || "-") + "</td>" +
                  '<td><button class="btn btn-sm btn-primary" type="button" onclick="addSong(' + index + ')">加入队列</button></td>' +
                "</tr>"
              );
            })
            .join("") || '<tr><td colspan="4" class="empty-state">没有找到相关歌曲</td></tr>';
        searchPage = data.page || 1;
        searchPages = data.pages || 1;
        AdminShell.byId("searchInfo").textContent = "第 " + searchPage + "/" + searchPages + " 页，共 " + (data.total || 0) + " 条";
        AdminShell.showMessage("searchMsg", "搜索完成");
      } catch (error) {
        AdminShell.showMessage("searchMsg", error.message, true);
      }
    }

    function changeSearch(delta) {
      const next = searchPage + delta;
      if (next < 1 || next > searchPages) {
        return;
      }
      searchPage = next;
      searchSongs(false).catch(() => {});
    }

    async function addSong(index) {
      try {
        const song = searchResults[index];
        if (!song || !song.id) {
          throw new Error("歌曲数据无效，请重新搜索");
        }
        const data = await AdminShell.req("/admin/api/add", {
          method: "POST",
          body: JSON.stringify(song),
        });
        AdminShell.showMessage("searchMsg", "已加入队列：" + (data.name || song.name) + "（位置 " + (data.position ?? "-") + "）");
        await loadQueue();
      } catch (error) {
        AdminShell.showMessage("searchMsg", error.message, true);
      }
    }

    AdminShell.init({ page: "music", passwordHandler: login });
    check();
  </script>
</body>
</html>
