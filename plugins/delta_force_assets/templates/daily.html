<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>$title</title>
  <style>
    body{margin:0;background:linear-gradient(140deg,#281100,#5d2d06 40%,#8f5721);font-family:"Segoe UI","Microsoft YaHei",sans-serif;color:#fff7ef}
    #poster{width:1240px;padding:42px;box-sizing:border-box}
    .shell{background:rgba(32,14,5,.82);border:1px solid rgba(255,214,173,.15);border-radius:30px;padding:30px;box-shadow:0 24px 70px rgba(0,0,0,.35)}
    .hero{display:flex;align-items:center;gap:20px;margin-bottom:20px}
    .avatar{width:100px;height:100px;border-radius:24px;object-fit:cover;background:#51290f}
    .title{font-size:36px;font-weight:700}
    .subtitle{font-size:17px;color:#f0d6bc;margin-top:8px}
    .name{font-size:21px;margin-top:10px}
    .panel{margin-top:16px;padding:18px;border-radius:22px;background:rgba(255,255,255,.05)}
    .panel h3{margin:0 0 12px;font-size:20px}
    .row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.07)}
    .row:last-child{border-bottom:none}
    .label{color:#e9c9a7}
    .value{font-weight:600}
    .empty{padding:12px 0;color:#e9c9a7}
  </style>
</head>
<body>
  <div id="poster">
    <div class="shell">
      <div class="hero">
        <img class="avatar" src="$hero_image" alt="">
        <div>
          <div class="title">$title</div>
          <div class="subtitle">$subtitle</div>
          <div class="name">$hero_name</div>
        </div>
      </div>
      $body_html
    </div>
  </div>
</body>
</html>
