<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>$title</title>
  <style>
    body{margin:0;background:radial-gradient(circle at top right,#4f1520 0,#22101a 40%,#0f1724 100%);font-family:"Segoe UI","Microsoft YaHei",sans-serif;color:#f8eff2}
    #poster{width:1200px;padding:40px;box-sizing:border-box}
    .shell{background:rgba(12,15,22,.84);border:1px solid rgba(230,118,134,.14);border-radius:28px;padding:28px 30px;box-shadow:0 24px 70px rgba(0,0,0,.34)}
    .hero{display:flex;gap:20px;align-items:center;margin-bottom:24px}
    .avatar{width:104px;height:104px;border-radius:24px;object-fit:cover;background:#24131a;border:1px solid rgba(255,255,255,.14)}
    .title{font-size:38px;font-weight:700;letter-spacing:.04em}
    .subtitle{font-size:18px;color:#e4a8b1;margin-top:8px}
    .name{font-size:22px;color:#fff3f5;margin-top:10px}
    .panel{margin-top:18px;padding:18px 20px;border-radius:20px;background:rgba(255,255,255,.05)}
    .panel h3{margin:0 0 12px;font-size:20px}
    .row{display:flex;justify-content:space-between;gap:24px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06)}
    .row:last-child{border-bottom:none}
    .label{color:#d8acb3}
    .value{font-weight:600;text-align:right}
    .empty{padding:14px 0;color:#d8acb3}
  </style>
</head>
<body>
  <div id="poster">
    <div class="shell">
      <div class="hero">
        <img class="avatar" src="$hero_image" alt="">
        <div>
          <div class="title">$title</div>
          <div class="subtitle">$subtitle</div>
          <div class="name">$hero_name</div>
        </div>
      </div>
      $body_html
    </div>
  </div>
</body>
</html>
