services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis-data:/data

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      netease-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      TZ: Asia/Shanghai
      BOT_REDIS_HOST: redis
      BOT_NETEASE_BASE_URL: http://netease-api:3000
      # BOT_LOG_CONSOLE_LEVEL: INFO       # DEBUG / INFO / WARNING / ERROR
      # BOT_LOG_FILE_LEVEL: DEBUG
    ports:
      - "8080:8080"
    shm_size: "1gb"
    volumes:
      - ./config.py:/app/config.py:ro
      - ./private_key.py:/app/private_key.py:ro
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs

  netease-api:
    image: moefurina/ncm-api:latest
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "require('http').get('http://127.0.0.1:3000/',res=>process.exit(res.statusCode<500?0:1)).on('error',()=>process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 20
    expose:
      - "3000"
    ports:
      - "3000:3000"

volumes:
  redis-data:
